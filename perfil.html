<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BIN · Perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="perfil.css">
    <style>
        html, body {
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }
        * {
            max-width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="mobile-frame">

        <!-- Barra superior con volver -->
        <div class="top-gradient">
            <a href="index.html" class="back-btn">✕</a>
            <div class="app-title">PERFIL</div>
            <div class="app-tagline">#STREET</div>
        </div>

        <!-- Contenido del perfil -->
        <div class="profile-container" id="profile-container">

            <!-- Portada -->
            <div class="cover-container">
                <img id="cover-image" src="https://images.unsplash.com/photo-1563089145-599997674d42?w=600&h=200&fit=crop" alt="Portada">
                <button id="change-cover-btn" class="cover-edit-btn">✎ Cambiar portada</button>
            </div>

            <!-- Avatar y nombre -->
            <div class="profile-header">
                <div class="avatar-container">
                    <img id="profile-avatar" src="" alt="Avatar">
                    <button id="change-avatar-btn" class="avatar-edit-btn">✎</button>
                </div>
                <div class="profile-info">
                    <h1 id="profile-name">Usuario</h1>
                    <span id="profile-username">@usuario</span>
                    <p id="profile-bio">Descripción del perfil</p>
                </div>
                <button id="edit-profile-btn" class="edit-profile-btn">✎ Editar perfil</button>
            </div>

            <!-- Estadísticas -->
            <div class="profile-stats">
                <div class="stat">
                    <span class="stat-number" id="post-count">0</span>
                    <span class="stat-label">Publicaciones</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="event-count">0</span>
                    <span class="stat-label">Eventos</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="follower-count">0</span>
                    <span class="stat-label">Seguidores</span>
                </div>
            </div>

            <!-- Tabs: Publicaciones / Eventos -->
            <div class="profile-tabs">
                <button class="tab-btn active" data-tab="posts">📸 Publicaciones</button>
                <button class="tab-btn" data-tab="events">📅 Eventos</button>
            </div>

            <!-- Contenido de los tabs -->
            <div class="tab-content" id="tab-posts">
                <!-- Aquí se cargarán las publicaciones del usuario -->
                <div class="posts-grid" id="user-posts">
                    <div class="loading-message">Cargando publicaciones...</div>
                </div>
            </div>
            <div class="tab-content" id="tab-events" style="display:none;">
                <!-- Aquí se cargarán los eventos del usuario -->
                <div class="events-list" id="user-events">
                    <div class="loading-message">Cargando eventos...</div>
                </div>
            </div>

        </div>

        <!-- Barra inferior con navegación -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item">🏠</a>
            <a href="explore.html" class="nav-item">🔍</a>
            <a href="camera.html" class="nav-item">📷</a>
            <a href="artists.html" class="nav-item">🎨</a>
            <a href="perfil.html" class="nav-item active">👤</a>
        </div>

    </div>

    <!-- Modal para editar perfil -->
    <div id="edit-profile-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <button id="close-modal" class="modal-close-btn">✕</button>
            <h2>✎ Editar perfil</h2>
            <div class="modal-body">
                <div class="input-group">
                    <label>Nombre</label>
                    <input type="text" id="edit-name" placeholder="Tu nombre">
                </div>
                <div class="input-group">
                    <label>Nombre de usuario</label>
                    <input type="text" id="edit-username" placeholder="@usuario">
                </div>
                <div class="input-group">
                    <label>Biografía</label>
                    <textarea id="edit-bio" placeholder="Cuéntanos sobre ti..." rows="3"></textarea>
                </div>
                <div class="input-group">
                    <label>URL de portada (opcional)</label>
                    <input type="text" id="edit-cover" placeholder="https://...">
                </div>
                <button id="save-profile-btn" class="save-btn">💾 Guardar cambios</button>
            </div>
        </div>
    </div>

    <script type="module" src="perfil.js"></script>

</body>
</html>
