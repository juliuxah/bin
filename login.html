<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Iniciar sesión - BIN</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-base);
            padding: 20px;
        }
        .login-container {
            max-width: 420px;
            width: 100%;
            background: var(--bg-surface);
            border-radius: 24px;
            padding: 30px 24px 40px;
            border: 1px solid var(--border-vivid);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .login-container h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--text-1);
            margin-bottom: 8px;
        }
        .login-container .sub {
            text-align: center;
            color: var(--text-2);
            font-size: 14px;
            margin-bottom: 28px;
        }
        .login-container label {
            display: block;
            color: var(--text-1);
            font-size: 13px;
            font-weight: 600;
            margin-top: 16px;
            margin-bottom: 6px;
        }
        .login-container input[type="email"],
        .login-container input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-1);
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        .login-container input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(192,132,252,0.2);
        }
        .login-container .btn-login {
            width: 100%;
            margin-top: 28px;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: 14px;
            color: #0a0a0f;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 24px rgba(192,132,252,0.3);
        }
        .login-container .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(192,132,252,0.5);
        }
        .login-container .btn-login:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .login-container .error-msg {
            color: var(--like-red);
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
        }
        .login-container .success-msg {
            color: var(--neon-green);
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
        }
        .login-container .register-link {
            text-align: center;
            margin-top: 20px;
            color: var(--text-2);
            font-size: 14px;
        }
        .login-container .register-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .login-container .register-link a:hover {
            text-decoration: underline;
        }
        .login-container .forgot-password {
            text-align: right;
            margin-top: 8px;
        }
        .login-container .forgot-password a {
            color: var(--text-2);
            font-size: 13px;
            text-decoration: none;
        }
        .login-container .forgot-password a:hover {
            color: var(--accent);
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h1>BIN</h1>
    <p class="sub">Iniciar sesión</p>

    <form id="login-form" autocomplete="off">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tú@email.com" required />

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña" required />

        <div class="forgot-password">
            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-login" id="login-btn">Iniciar sesión</button>
        <div id="form-error" class="error-msg"></div>
        <div id="form-success" class="success-msg"></div>
    </form>

    <div class="register-link">
        ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
    </div>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
