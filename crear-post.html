<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Post - BIN</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos específicos para la página de crear post */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #e8e8e8;
            padding: 20px;
        }

        .create-page {
            width: 380px;
            height: 780px;
            background-color: #f8f8f8;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .create-header {
            background: #ffffff;
            padding: 20px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            position: relative;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            flex-shrink: 0;
        }

        .create-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 6px;
            margin: 0;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            background: none;
            border: none;
            color: #555;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 8px;
            line-height: 1;
        }

        .back-btn:hover {
            background: rgba(0,0,0,0.05);
            transform: scale(1.1);
        }

        .create-body {
            flex: 1;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
            background: #fafafa;
            font-family: inherit;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #7ed957;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(126, 217, 87, 0.08);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 100px;
            max-height: 180px;
        }

        .input-group .char-count {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .image-upload-area {
            border: 2px dashed #d0d0d0;
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            background: #fafafa;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .image-upload-area:hover {
            border-color: #7ed957;
            background: #f4fcf4;
        }

        .image-upload-area .upload-icon {
            font-size: 36px;
            display: block;
            margin-bottom: 8px;
        }

        .image-upload-area .upload-text {
            font-size: 14px;
            color: #888;
            font-weight: 500;
        }

        .image-upload-area .upload-subtext {
            font-size: 12px;
            color: #bbb;
            margin-top: 4px;
        }

        .image-upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        #preview-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #f0f0f0;
            display: none;
        }

        #preview-container img {
            width: 100%;
            height: auto;
            max-height: 250px;
            object-fit: cover;
            display: block;
        }

        .remove-image-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-image-btn:hover {
            background: #e74c3c;
            transform: scale(1.1);
        }

        .publish-btn {
            background: #7ed957;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 17px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(126, 217, 87, 0.35);
            margin-top: 8px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .publish-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            background: #5cb85c;
            box-shadow: 0 6px 24px rgba(126, 217, 87, 0.45);
        }

        .publish-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        .publish-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .success-message {
            background: #2ecc71;
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            animation: slideDown 0.4s ease;
            display: none;
            flex-shrink: 0;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .create-body::-webkit-scrollbar {
            width: 4px;
        }
        .create-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .create-body::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="create-page">
        <div class="create-header">
            <a href="index.html" class="back-btn">←</a>
            <h1>CREAR POST</h1>
        </div>

        <div class="create-body">
            <div class="input-group">
                <label>📝 Título del post</label>
                <input type="text" id="post-title" placeholder="Escribe un título..." maxlength="30">
                <div class="char-count"><span id="title-count">0</span>/30</div>
            </div>

            <div class="input-group">
                <label>📄 Descripción</label>
                <textarea id="post-description" placeholder="Escribe una descripción..." maxlength="200"></textarea>
                <div class="char-count"><span id="desc-count">0</span>/200</div>
            </div>

            <div class="input-group">
                <label>🖼️ Imagen</label>
                <div class="image-upload-area" id="upload-area">
                    <span class="upload-icon">📸</span>
                    <span class="upload-text">Toca para seleccionar una imagen</span>
                    <span class="upload-subtext">o arrastra y suelta aquí</span>
                    <input type="file" id="image-input" accept="image/*">
                </div>
                <div id="preview-container">
                    <img id="image-preview" src="#" alt="Vista previa">
                    <button id="remove-image" class="remove-image-btn">✕</button>
                </div>
            </div>

            <div id="success-message" class="success-message">
                ✅ ¡Post creado con éxito!
            </div>

            <button id="publish-btn" class="publish-btn" disabled>PUBLICAR</button>
        </div>
    </div>

    <!-- SCRIPT CORREGIDO: usa Firestore en lugar de localStorage -->
    <script type="module">
        // ============================================================
        // 1. IMPORTAR FIREBASE
        // ============================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        console.log('✅ Módulos Firebase importados correctamente.');

        // ============================================================
        // 2. CONFIGURACIÓN DE FIREBASE
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCZwssYsjLjBXiIE5_1BNPYICU3MLgJR08",
            authDomain: "bin1-462ea.firebaseapp.com",
            projectId: "bin1-462ea",
            storageBucket: "bin1-462ea.firebasestorage.app",
            messagingSenderId: "446700825873",
            appId: "1:446700825873:web:2550025dfc6610b8a2b8b3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        console.log('✅ Firebase inicializado. Base de datos lista.');

        // ============================================================
        // 3. ESPERAR A QUE EL DOM ESTÉ LISTO
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ DOM completamente cargado.');

            // --- Referencias a elementos ---
            const titleInput = document.getElementById('post-title');
            const descriptionInput = document.getElementById('post-description');
            const titleCount = document.getElementById('title-count');
            const descCount = document.getElementById('desc-count');
            const imageInput = document.getElementById('image-input');
            const uploadArea = document.getElementById('upload-area');
            const previewContainer = document.getElementById('preview-container');
            const previewImg = document.getElementById('image-preview');
            const removeImageBtn = document.getElementById('remove-image');
            const publishBtn = document.getElementById('publish-btn');
            const successMessage = document.getElementById('success-message');

            // Verificar que todos los elementos existen
            console.log('🔍 Elementos del DOM:', {
                titleInput: !!titleInput,
                descriptionInput: !!descriptionInput,
                imageInput: !!imageInput,
                publishBtn: !!publishBtn,
                successMessage: !!successMessage
            });

            let selectedFile = null;

            // --- Contador de caracteres ---
            titleInput.addEventListener('input', function() {
                titleCount.textContent = this.value.length;
            });
            descriptionInput.addEventListener('input', function() {
                descCount.textContent = this.value.length;
            });

            // --- Selección de imagen ---
            imageInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) {
                    console.warn('⚠️ No se seleccionó ningún archivo.');
                    return;
                }
                selectedFile = file;
                console.log(`📸 Archivo seleccionado: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`);

                const reader = new FileReader();
                reader.onload = function(ev) {
                    previewImg.src = ev.target.result;
                    previewContainer.style.display = 'block';
                    uploadArea.style.display = 'none';
                    publishBtn.disabled = false;
                    successMessage.style.display = 'none';
                    console.log('✅ Vista previa de imagen cargada.');
                };
                reader.readAsDataURL(file);
            });

            // --- Eliminar imagen ---
            removeImageBtn.addEventListener('click', function() {
                console.log('🗑️ Eliminando imagen seleccionada.');
                selectedFile = null;
                previewContainer.style.display = 'none';
                uploadArea.style.display = 'flex';
                imageInput.value = '';
                publishBtn.disabled = true;
                successMessage.style.display = 'none';
            });

            // --- Función para comprimir imagen (reduce tamaño) ---
            function compressImage(dataUrl, maxWidth = 800, quality = 0.7) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = dataUrl;
                });
            }

            // --- Publicar en Firestore ---
            publishBtn.addEventListener('click', async function() {
                console.log('🚀 Click en PUBLICAR.');

                if (!selectedFile) {
                    alert('Por favor, selecciona una imagen.');
                    return;
                }

                const title = titleInput.value.trim() || 'NUEVO POST';
                const description = descriptionInput.value.trim() || '';
                console.log(`📝 Título: "${title}"`);
                console.log(`📄 Descripción: "${description}"`);

                // Leer la imagen como DataURL
                const reader = new FileReader();
                reader.onload = async function(ev) {
                    try {
                        // Comprimir la imagen para no exceder el límite de 1MB de Firestore
                        console.log('🔄 Comprimiendo imagen...');
                        const compressedImage = await compressImage(ev.target.result);
                        console.log(`✅ Imagen comprimida. Tamaño: ${(compressedImage.length / 1024).toFixed(2)} KB`);

                        // Datos del post
                        const postData = {
                            title: title,
                            description: description,
                            image: compressedImage,
                            fecha: new Date()  // campo para ordenar en el feed
                        };

                        // Guardar en Firestore
                        console.log('⏳ Enviando datos a Firestore...');
                        const docRef = await addDoc(collection(db, "posts"), postData);
                        console.log(`✅ Post guardado con ID: ${docRef.id}`);

                        // Mostrar mensaje de éxito
                        successMessage.style.display = 'block';
                        publishBtn.disabled = true;

                        // Resetear formulario
                        titleInput.value = '';
                        descriptionInput.value = '';
                        titleCount.textContent = '0';
                        descCount.textContent = '0';
                        selectedFile = null;
                        previewContainer.style.display = 'none';
                        uploadArea.style.display = 'flex';
                        imageInput.value = '';

                        // Redirigir al feed
                        console.log('⏳ Redirigiendo a index.html en 1.5 segundos...');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);

                    } catch (error) {
                        console.error('❌ ERROR al guardar en Firestore:', error);
                        alert(`Error al publicar: ${error.message}`);
                    }
                };
                reader.readAsDataURL(selectedFile);
            });

            // --- Drag & Drop ---
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.style.borderColor = '#7ed957';
                this.style.background = '#f4fcf4';
            });

            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.style.borderColor = '#d0d0d0';
                this.style.background = '#fafafa';
            });

            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                this.style.borderColor = '#d0d0d0';
                this.style.background = '#fafafa';
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    imageInput.files = files;
                    imageInput.dispatchEvent(new Event('change'));
                }
            });

            console.log('✅ Script de crear post completamente inicializado.');
        });
    </script>

</body>
</html>
