<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión - BIN</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <style>
        body {
            background: #0d0b0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #161218;
            padding: 40px 30px;
            border-radius: 8px 20px 8px 20px;
            border: 2px solid var(--border-vivid);
            max-width: 380px;
            width: 100%;
            box-shadow: 0 0 40px rgba(247,201,72,0.05);
        }
        .login-container h1 {
            font-family: 'Anton', sans-serif;
            color: var(--accent);
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 4px;
        }
        .login-container input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            background: var(--bg-base);
            border: 2px solid var(--border);
            border-radius: 4px 12px 4px 12px;
            color: var(--text-1);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-container input:focus {
            border-color: var(--accent);
        }
        .login-container button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 4px 12px 4px 12px;
            font-family: 'Bebas Neue', cursive;
            font-size: 20px;
            color: #0d0b0e;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 2px;
        }
        .login-container button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(247,201,72,0.3);
        }
        .login-container button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .login-container .links {
            text-align: center;
            margin-top: 20px;
            color: var(--text-2);
            font-size: 14px;
        }
        .login-container .links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            margin: 0 8px;
        }
        .login-container .links a:hover {
            text-decoration: underline;
        }
        .login-container .error {
            color: var(--like-red);
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;
            min-height: 20px;
        }
        .login-container .success {
            color: #4ade80;
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;
            min-height: 20px;
        }
        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-2);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .back-home:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔑 INICIAR SESIÓN</h1>
        <!-- FORMULARIO con ID correcto -->
        <form id="login-form">
            <div id="form-error" class="error"></div>
            <div id="form-success" class="success"></div>
            <input type="email" id="email" placeholder="Correo electrónico" required />
            <input type="password" id="password" placeholder="Contraseña" required />
            <button id="login-btn" type="submit">ENTRAR</button>
        </form>
        <div class="links">
            ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
        </div>
        <a href="../index.html" class="back-home">← Volver al inicio</a>
    </div>
    <script type="module" src="../assets/js/login.js"></script>
</body>
</html>
