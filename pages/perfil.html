<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil - BIN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/perfil.css" />
    <style>
        /* estilos básicos de respaldo */
        body {
            background: #0d0b0e;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .mobile-frame {
            width: 100%;
            max-width: 500px;
            height: 100dvh;
            background: var(--bg-base);
            border-radius: 0;
            overflow-y: auto;
            position: relative;
        }
        @media (min-width: 600px) {
            .mobile-frame {
                border-radius: 28px 28px 28px 8px;
                height: 780px;
                max-width: 380px;
                box-shadow: 0 0 0 2px var(--border-vivid), 0 40px 80px rgba(0,0,0,0.8);
            }
        }
        .perfil-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: var(--bg-raised);
            border-bottom: 2px solid var(--border-vivid);
            gap: 12px;
        }
        .perfil-header .back-btn {
            color: var(--text-1);
            font-size: 24px;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
        }
        .perfil-header .back-btn:hover {
            color: var(--accent);
        }
        .perfil-header h1 {
            font-family: 'Anton', sans-serif;
            font-size: 22px;
            color: var(--accent);
            letter-spacing: 3px;
            margin: 0;
            flex: 1;
        }
        .perfil-content {
            padding: 20px;
        }
        .cover {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, var(--accent3), var(--accent2));
            border-radius: 4px 12px 4px 12px;
            margin-bottom: -40px;
            position: relative;
            overflow: hidden;
        }
        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }
        .avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 4px 18px 4px 18px;
            border: 4px solid var(--accent);
            overflow: hidden;
            background: var(--bg-surface);
            box-shadow: 0 0 30px rgba(247,201,72,0.15);
        }
        .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-info {
            text-align: center;
            margin: 8px 0 20px;
        }
        .user-info .name {
            font-family: 'Anton', sans-serif;
            font-size: 24px;
            color: var(--text-1);
            letter-spacing: 2px;
        }
        .user-info .bio {
            color: var(--text-2);
            font-size: 14px;
            margin-top: 4px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 12px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .stats .stat {
            text-align: center;
        }
        .stats .stat .number {
            font-family: 'Anton', sans-serif;
            font-size: 20px;
            color: var(--accent);
        }
        .stats .stat .label {
            font-size: 12px;
            color: var(--text-2);
            letter-spacing: 1px;
        }
        .section-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }
        .grid-posts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }
        .grid-posts .post-thumb {
            aspect-ratio: 1/1;
            background: var(--bg-surface);
            border-radius: 4px 8px 4px 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .grid-posts .post-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .events-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .event-item {
            background: var(--bg-surface);
            padding: 12px 16px;
            border-radius: 4px 10px 4px 10px;
            border: 1px solid var(--border);
            color: var(--text-1);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .event-item .event-date {
            color: var(--accent);
            font-weight: 700;
            min-width: 60px;
        }
        .event-item .event-name {
            flex: 1;
        }
        .btn-edit {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 4px 12px 4px 12px;
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            color: #0d0b0e;
            cursor: pointer;
            margin-top: 20px;
            letter-spacing: 2px;
            transition: all 0.2s;
        }
        .btn-edit:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(247,201,72,0.3);
        }
        .loading-spinner {
            text-align: center;
            color: var(--text-2);
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="perfil-header">
            <a href="../index.html" class="back-btn">←</a>
            <h1>PERFIL</h1>
        </div>
        <div class="perfil-content" id="perfil-content">
            <div class="loading-spinner">Cargando perfil...</div>
        </div>
    </div>
    <script type="module" src="../assets/js/perfil.js"></script>
</body>
</html>
