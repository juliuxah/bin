<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BIN - Social</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        html, body {
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }
        * {
            max-width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="mobile-frame">

        <!-- Barra superior -->
        <div class="top-gradient">
            <div class="app-title">BIN</div>
        </div>

        <!-- Navegación SUPERIOR con botones de autenticación -->
        <div class="top-nav">
            <a href="crear-post.html" class="create-post-btn" title="Crear nuevo post">
                <span class="plus-icon">+</span>
            </a>
            <!-- Botón Registrarse (visible solo si no autenticado) -->
            <a href="registro.html" class="nav-auth-btn" id="register-btn-nav" title="Registrarse">
                <span class="auth-icon">📝</span>
            </a>
            <!-- Botón Iniciar sesión (visible solo si no autenticado) -->
            <a href="login.html" class="nav-auth-btn" id="login-btn-nav" title="Iniciar sesión">
                <span class="auth-icon">🔑</span>
            </a>
            <!-- Botón Cerrar sesión (visible solo si autenticado) -->
            <button class="nav-auth-btn" id="logout-btn" title="Cerrar sesión" style="display:none;">
                <span class="auth-icon">🚪</span>
            </button>
            <!-- Círculo con foto de perfil del usuario (visible solo si autenticado) -->
            <div class="drop-zone" id="user-avatar" style="display:none;">
                <img id="user-avatar-img" src="" alt="User">
            </div>
            <!-- Círculos de perfil de ejemplo -->
            <div class="drop-zone"><img src="imagenes/perfiles/pou.jpg" alt="Pou"></div>
            <div class="drop-zone"><img src="imagenes/perfiles/dwey.jpg" alt="Dwey"></div>
            <div class="drop-zone"><img src="imagenes/perfiles/pepe.jpg" alt="Pepe"></div>
            <div id="camera-btn" class="camera-icon"></div>
        </div>

        <!-- Feed -->
        <div class="feed-container" id="feed">
            <!-- Los posts se cargan dinámicamente con JavaScript -->
        </div>

        <!-- Cámara (overlay) -->
        <div id="camera-overlay" class="camera-overlay">
            <video id="webcam" autoplay playsinline></video>
            <div id="camera-fallback" class="camera-fallback">
                <span>📷 Cámara Simulada</span>
                <p>Abierta correctamente</p>
            </div>
            <button id="close-camera" class="close-camera-btn">✕</button>
            <div class="camera-shutter"></div>
        </div>

        <!-- Barra inferior -->
        <div class="bottom-nav"></div>

    </div>

    <div id="drag-element"></div>

    <!-- Script principal (módulo) -->
    <script type="module" src="script.js"></script>

    <!-- Overlay de previsualización -->
    <div id="post-preview-overlay" class="preview-overlay">
        <button id="close-preview" class="close-preview-btn">✕</button>
        <div id="preview-container" class="preview-content"></div>
    </div>

</body>
</html>
