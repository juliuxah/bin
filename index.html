<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BIN · Street Social</title>
    <!-- Fuentes urbanas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        html, body {
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }
        * {
            max-width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="mobile-frame">

        <!-- Barra superior con firma -->
        <div class="top-gradient">
            <div class="app-title">BIN</div>
            <div class="app-tagline">#STREET</div>
        </div>

        <!-- Navegación SUPERIOR con botones de autenticación -->
        <div class="top-nav">
            <a href="pages/crear-post.html" class="create-post-btn" title="Crear nuevo post">
                <span class="plus-icon">+</span>
            </a>
            <a href="pages/registro.html" class="nav-auth-btn" id="register-btn-nav" title="Registrarse">
                <span class="auth-icon">📝</span>
            </a>
            <a href="pages/login.html" class="nav-auth-btn" id="login-btn-nav" title="Iniciar sesión">
                <span class="auth-icon">🔑</span>
            </a>
            <button class="nav-auth-btn" id="logout-btn" title="Cerrar sesión" style="display:none;">
                <span class="auth-icon">🚪</span>
            </button>
            <a href="pages/perfil.html" class="drop-zone" id="user-avatar" style="display:none;">
                <img id="user-avatar-img" src="" alt="User">
            </a>
            <div class="drop-zone"><img src="assets/images/perfiles/pou.jpg" alt="Pou"></div>
            <div class="drop-zone"><img src="assets/images/perfiles/dwey.jpg" alt="Dwey"></div>
            <div class="drop-zone"><img src="assets/images/perfiles/pepe.jpg" alt="Pepe"></div>
            <div id="camera-btn" class="camera-icon"></div>
        </div>

        <!-- Feed -->
        <div class="feed-container" id="feed">
            <!-- Los posts se cargan dinámicamente con JavaScript -->
        </div>

        <!-- Cámara (overlay) -->
        <div id="camera-overlay" class="camera-overlay">
            <video id="webcam" autoplay playsinline></video>
            <div id="camera-fallback" class="camera-fallback">
                <span>📷 Cámara Simulada</span>
                <p>Abierta correctamente</p>
            </div>
            <button id="close-camera" class="close-camera-btn">✕</button>
            <div class="camera-shutter"></div>
        </div>

        <!-- Barra inferior con firma -->
        <div class="bottom-nav">
            <span class="bottom-tag">✪ BIN · STREET CULTURE ✪</span>
        </div>

    </div>

    <div id="drag-element"></div>

    <!-- Script principal (módulo) -->
    <script type="module" src="assets/js/script.js"></script>

    <!-- Overlay de previsualización fullscreen -->
    <div id="post-preview-overlay" class="preview-overlay">
        <button id="close-preview" class="close-preview-btn">✕</button>
        <div id="preview-container" style="width:100%;height:100%;position:relative;"></div>
        <div class="preview-swipe-hint left">‹</div>
        <div class="preview-swipe-hint right">›</div>
    </div>

</body>
</html>
